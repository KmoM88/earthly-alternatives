name: Benchmark Build Tools

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Setup Earthly
        run: |
          sudo wget 'https://github.com/earthly/earthly/releases/latest/download/earthly-linux-amd64' -O /usr/local/bin/earthly
          sudo chmod +x /usr/local/bin/earthly

      - name: Set up Python for Dagger
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dagger dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ros-apt-source/dagger/requirements.txt

      - name: Run benchmarks
        run: make clean && make benchmark-all RUNS=10

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: results.csv
